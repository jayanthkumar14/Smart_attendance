version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: attendance_db
      POSTGRES_USER: attend_user
      POSTGRES_PASSWORD: attend_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attend_user -d attendance_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://attend_user:attend_pass@db:5432/attendance_db
      SECRET_KEY: change-me-in-production
      FLASK_ENV: development
    volumes:
      - ./enrolled_faces:/app/enrolled_faces
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
